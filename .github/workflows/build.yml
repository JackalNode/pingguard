name: Build and Release PingGuard

on:
  push:
    tags:
      - 'v*'   # triggers on any tag like v2.0.5, v2.1.0, v3.0.0 etc.

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create constants.py from GitHub Secret
        shell: powershell
        run: |
          $content = "DISCORD_REPORT_WEBHOOK = `"${{ secrets.DISCORD_REPORT_WEBHOOK }}`""
          Set-Content -Path "constants.py" -Value $content

      - name: Build with PyInstaller
        run: python -m PyInstaller pingguard.spec

      - name: Build installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "PingGuard.iss"

      - name: List output files (debug)
        shell: powershell
        run: |
          echo "--- installer_output contents ---"
          if (Test-Path "installer_output") { Get-ChildItem -Path "installer_output" -Recurse } else { echo "installer_output folder not found" }
          echo "--- installer contents ---"
          if (Test-Path "installer") { Get-ChildItem -Path "installer" -Recurse } else { echo "installer folder not found" }
          echo "--- root exe files ---"
          Get-ChildItem -Path "." -Filter "*.exe" -Recurse | Select-Object FullName

      - name: Get version from tag
        id: get_version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PingGuard v${{ steps.get_version.outputs.VERSION }}
          files: installer_output/PingGuard_Setup_v${{ steps.get_version.outputs.VERSION }}.exe
          generate_release_notes: false
          draft: false
          prerelease: false
