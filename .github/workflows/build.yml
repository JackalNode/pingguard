name: Build and Release PingGuard

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'   # only triggers on clean version tags like v2.0.5, not v2.0.5-debug

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create constants.py from GitHub Secret
        shell: powershell
        run: |
          $content = "DISCORD_REPORT_WEBHOOK = `"${{ secrets.DISCORD_REPORT_WEBHOOK }}`""
          Set-Content -Path "constants.py" -Value $content

      - name: Get version from tag
        id: get_version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version is: $version"

      - name: Build with PyInstaller
        run: python -m PyInstaller pingguard.spec

      - name: Build installer with Inno Setup
        shell: powershell
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          echo "Building installer for version: $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" "PingGuard.iss"
          echo "--- installer_output contents ---"
          Get-ChildItem -Path "installer_output" -Recurse

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PingGuard v${{ steps.get_version.outputs.VERSION }}
          files: installer_output/PingGuard_Setup_v${{ steps.get_version.outputs.VERSION }}.exe
          generate_release_notes: false
          draft: false
          prerelease: false
