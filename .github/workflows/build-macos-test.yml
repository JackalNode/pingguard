name: macOS Test Build (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14   # Apple Silicon (arm64)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create constants.py from GitHub Secret
        run: |
          echo "DISCORD_REPORT_WEBHOOK = \"${{ secrets.DISCORD_REPORT_WEBHOOK }}\"" > constants.py

      - name: Build with PyInstaller
        run: python -m PyInstaller pingguard.spec

      - name: Zip .app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/PingGuard.app" "PingGuard-macos-test.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PingGuard-macos-test
          path: PingGuard-macos-test.zip
          retention-days: 14

      - name: Upload PyInstaller warnings
        uses: actions/upload-artifact@v4
        with:
          name: PingGuard-macos-warnings
          path: build/pingguard/warn-pingguard.txt
          retention-days: 14
